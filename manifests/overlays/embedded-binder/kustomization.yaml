apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Embedded Binder overlay: merges Binder functionality into Scheduler.
# When this overlay is applied, the standalone Binder deployment is scaled
# to zero and the Scheduler deployment receives --enable-embedded-binder.

bases:
  - ../../base

patchesStrategicMerge:
  - scheduler-embedded.yaml
  - binder-disabled.yaml
