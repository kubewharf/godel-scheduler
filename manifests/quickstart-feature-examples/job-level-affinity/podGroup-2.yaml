apiVersion: scheduling.godel.kubewharf.io/v1alpha1
kind: PodGroup
metadata:
  generation: 1
  name: nginx-2
spec:
  affinity:
    podGroupAffinity:
      preferred:
        - topologyKey: micronet
      required:
        - topologyKey: mainnet
      sortRules:
        - resource: CPU
          dimension: Capacity
          order: Descending
  minMember: 15
  scheduleTimeoutSeconds: 3000